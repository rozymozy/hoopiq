<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courtside — Dashboard</title>
  <script src="nav.js?v=2" defer></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--green:#2C5F8A;--green-light:#E3EEF6;--orange:#F4A35C;--purple:#7C3AED;--purple-light:#EDE9FE;--bg:#f4f4f6;--border:#e8e8ec;--text:#111827;--muted:#6b7280;--subtle:#9ca3af}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .container{max-width:800px;margin:0 auto;padding:24px 16px}
    .welcome{margin-bottom:28px}
    .welcome-title{font-size:22px;font-weight:700}
    .welcome-sub{font-size:14px;color:var(--muted);margin-top:4px}
    .section-title{font-size:14px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
    .league-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-bottom:28px}
    .league-card{background:#fff;border-radius:10px;border:1px solid var(--border);padding:16px;cursor:pointer;transition:box-shadow .15s,transform .15s;text-decoration:none;display:block}
    .league-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-1px)}
    .lc-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px}
    .lc-team{font-size:12px;color:var(--muted);margin-bottom:10px}
    .lc-pills{display:flex;gap:5px;flex-wrap:wrap}
    .lc-pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;background:var(--bg);color:var(--muted)}
    .lc-pill.active{background:var(--green-light);color:#1E4566}
    .lc-pill.draft{background:var(--purple-light);color:var(--purple)}
    .new-league-card{background:#fff;border-radius:10px;border:2px dashed var(--border);padding:16px;cursor:pointer;transition:border-color .15s;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--muted);font-size:14px;font-weight:600;min-height:90px;text-decoration:none}
    .new-league-card:hover{border-color:var(--green);color:var(--green)}
    .action-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px}
    .action-btn{padding:10px 20px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:var(--text);text-decoration:none;display:inline-block}
    .action-btn:hover{background:var(--bg)}
    .action-btn.primary{background:var(--green);color:#fff;border-color:var(--green)}.action-btn.primary:hover{opacity:.9}
    .empty-state{text-align:center;padding:48px 16px;color:var(--muted)}
    .empty-state-title{font-size:16px;font-weight:600;margin-bottom:8px;color:var(--text)}
    .empty-state-sub{font-size:13px;margin-bottom:20px}
    .user-pill{display:flex;align-items:center;gap:8px;padding:8px 14px;background:#fff;border-radius:10px;border:1px solid var(--border);margin-bottom:20px;width:fit-content}
    .user-avatar{width:32px;height:32px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#1E4566;flex-shrink:0}
    .user-email{font-size:13px;color:var(--muted)}
    .signout-btn{font-size:12px;color:var(--orange);cursor:pointer;background:none;border:none;margin-left:8px}
    .signout-btn:hover{text-decoration:underline}
    .loading{color:var(--muted);font-size:13px;padding:20px 0}
  </style>
</head>
<body>
<div class="container">
  <div class="welcome">
    <div class="welcome-title">Welcome back 👋</div>
    <div class="welcome-sub" id="welcome-sub">Loading your leagues...</div>
  </div>

  <div class="user-pill" id="user-pill" style="display:none">
    <div class="user-avatar" id="user-avatar">?</div>
    <div class="user-email" id="user-email">—</div>
    <button class="signout-btn" onclick="signOut()">Sign out</button>
  </div>

  <div class="action-row">
    <a class="action-btn primary" href="lobby.html">+ Create a league</a>
    <a class="action-btn" href="index.html">📊 Projections</a>
  </div>

  <div class="section-title">My Leagues</div>
  <div class="league-grid" id="league-grid">
    <div class="loading">Loading...</div>
  </div>
</div>

<script>
const API = 'https://hoopiq-api-production-d3a4.up.railway.app';

// Auth check
const session = JSON.parse(localStorage.getItem('courtside_session') || 'null');
const user    = JSON.parse(localStorage.getItem('courtside_user')    || 'null');

if (!session?.access_token) {
  window.location.href = 'auth.html';
}

// Show user info
if (user?.email) {
  document.getElementById('user-pill').style.display = 'flex';
  document.getElementById('user-email').textContent  = user.email;
  document.getElementById('user-avatar').textContent = user.email[0].toUpperCase();
  document.getElementById('welcome-sub').textContent = `Here are your leagues, ${user.email.split('@')[0]}`;
}

async function loadLeagues() {
  try {
    const res  = await fetch(`${API}/user/leagues`, {
      headers: {'Authorization': `Bearer ${session.access_token}`}
    });

    if (res.status === 401) {
      // Token expired — try refresh
      await refreshToken();
      return loadLeagues();
    }

    const data = await res.json();
    renderLeagues(data.leagues || []);
  } catch(e) {
    document.getElementById('league-grid').innerHTML =
      '<div class="loading">Could not load leagues — check your connection</div>';
  }
}

function renderLeagues(leagues) {
  const grid = document.getElementById('league-grid');
  if (!leagues.length) {
    grid.innerHTML = `
      <div style="grid-column:1/-1">
        <div class="empty-state">
          <div class="empty-state-title">No leagues yet</div>
          <div class="empty-state-sub">Create a league and invite friends to play</div>
          <a class="action-btn primary" href="lobby.html">+ Create my first league</a>
        </div>
      </div>`;
    return;
  }

  grid.innerHTML = leagues.map(m => {
    const lg     = m.leagues;
    const status = lg?.status || 'waiting';
    const statusLabel = {
      waiting:  '⏳ Waiting',
      drafting: '🔴 Draft live',
      complete: '✓ Draft done',
    }[status] || status;

    return `
    <a class="league-card" href="league.html?code=${lg?.code}&team=${encodeURIComponent(m.team_name)}&manager=${encodeURIComponent(m.manager_name)}">
      <div class="lc-name">${lg?.name || 'My League'}</div>
      <div class="lc-team">Playing as <strong>${m.team_name}</strong></div>
      <div class="lc-pills">
        <span class="lc-pill ${status==='drafting'?'active':''}">${statusLabel}</span>
        <span class="lc-pill">${lg?.league==='el'?'🌍 EL':'🏀 NBA'}</span>
        <span class="lc-pill ${lg?.draft_type==='auction'?'draft':''}">${lg?.draft_type==='auction'?'🔨 Auction':'🐍 Snake'}</span>
        <span class="lc-pill">${lg?.rounds||10} rounds</span>
      </div>
    </a>`;
  }).join('') + `
    <a class="new-league-card" href="lobby.html">
      + New league
    </a>`;
}

async function refreshToken() {
  const refresh_token = session?.refresh_token;
  if (!refresh_token) { signOut(); return; }
  try {
    const res  = await fetch(`${API}/auth/refresh`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({refresh_token}),
    });
    const data = await res.json();
    if (res.ok && data.session) {
      localStorage.setItem('courtside_session', JSON.stringify(data.session));
      session.access_token  = data.session.access_token;
      session.refresh_token = data.session.refresh_token;
    } else {
      signOut();
    }
  } catch(e) { signOut(); }
}

function signOut() {
  localStorage.removeItem('courtside_session');
  localStorage.removeItem('courtside_user');
  window.location.href = 'auth.html';
}

loadLeagues();
</script>
</body>
</html>
