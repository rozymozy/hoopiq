<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courtside — Signing in...</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f4f6;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
    .card{background:#fff;border-radius:14px;padding:40px;text-align:center;max-width:340px;width:92%;box-shadow:0 4px 24px rgba(0,0,0,.06)}
    .logo{font-size:22px;font-weight:700;margin-bottom:16px}.logo span{color:#2C5F8A}
    .spinner{width:36px;height:36px;border:3px solid #e8e8ec;border-top-color:#2C5F8A;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .msg{font-size:14px;color:#6b7280}
    .err{color:#F4A35C;font-size:13px;margin-top:12px}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">Court<span>side</span></div>
  <div class="spinner"></div>
  <div class="msg" id="msg">Completing sign-in...</div>
  <div class="err" id="err"></div>
</div>

<script>
const API = 'https://hoopiq-api-production-d3a4.up.railway.app';

// Supabase can return tokens two ways:
// 1. Implicit flow: #access_token=...&refresh_token=...  (URL hash)
// 2. PKCE flow:     ?code=...                              (query string)
async function handleCallback() {
  const hash       = window.location.hash.substring(1);
  const hashParams = new URLSearchParams(hash);
  const queryParams = new URLSearchParams(window.location.search);

  const access_token  = hashParams.get('access_token');
  const refresh_token = hashParams.get('refresh_token');
  const pkce_code     = queryParams.get('code');
  const error         = hashParams.get('error_description') || hashParams.get('error')
                       || queryParams.get('error_description') || queryParams.get('error');

  if (error) {
    document.getElementById('msg').textContent = 'Sign-in failed';
    document.getElementById('err').textContent = error;
    setTimeout(() => window.location.href = 'auth.html', 3000);
    return;
  }

  // PKCE flow: exchange the code for a session via our API
  if (pkce_code && !access_token) {
    try {
      const res  = await fetch(`${API}/auth/exchange`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({code: pkce_code}),
      });
      const data = await res.json();
      if (res.ok && data.session?.access_token) {
        localStorage.setItem('courtside_session', JSON.stringify(data.session));
        localStorage.setItem('courtside_user',    JSON.stringify(data.user));
        document.getElementById('msg').textContent = 'Signed in! Redirecting...';
        const redirectTo = queryParams.get('redirect') === 'lobby' ? 'lobby.html' : 'dashboard.html';
        window.location.href = redirectTo;
      } else {
        throw new Error(data.error || 'Exchange failed');
      }
    } catch(e) {
      document.getElementById('err').textContent = e.message;
      setTimeout(() => window.location.href = 'auth.html', 3000);
    }
    return;
  }

  if (access_token) {
    // Get user info
    try {
      const res = await fetch(`${API}/auth/me`, {
        headers: {'Authorization': `Bearer ${access_token}`}
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('courtside_session', JSON.stringify({access_token, refresh_token}));
        localStorage.setItem('courtside_user',    JSON.stringify(data.user));
        document.getElementById('msg').textContent = 'Signed in! Redirecting...';
        const urlParams  = new URLSearchParams(window.location.search);
        const redirectTo = urlParams.get('redirect') === 'lobby' ? 'lobby.html' : 'dashboard.html';
        window.location.href = redirectTo;
      } else {
        throw new Error(data.error || 'Auth failed');
      }
    } catch(e) {
      document.getElementById('err').textContent = e.message;
      setTimeout(() => window.location.href = 'auth.html', 3000);
    }
  } else {
    // No token — redirect back to login
    window.location.href = 'auth.html';
  }
}

handleCallback();
</script>
</body>
</html>
