<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courtside — Sign In</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--green:#2C5F8A;--green-light:#E3EEF6;--orange:#F4A35C;--bg:#f4f4f6;--border:#e8e8ec;--text:#111827;--muted:#6b7280;--subtle:#9ca3af}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
    .card{background:#fff;border-radius:14px;border:1px solid var(--border);padding:32px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
    .logo{font-size:24px;font-weight:700;text-align:center;margin-bottom:6px}.logo span{color:var(--green)}
    .tagline{font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px}
    .tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:24px}
    .tab{flex:1;font-size:14px;font-weight:600;padding:10px;border:none;background:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent}
    .tab.active{color:var(--green);border-bottom-color:var(--green)}
    label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:5px;margin-top:14px}
    label:first-of-type{margin-top:0}
    input{width:100%;padding:10px 12px;font-size:14px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--text);outline:none;transition:border-color .15s}
    input:focus{border-color:var(--green)}
    .btn{width:100%;padding:11px;font-size:14px;font-weight:600;border-radius:8px;border:none;cursor:pointer;margin-top:18px;transition:opacity .15s}
    .btn-green{background:var(--green);color:#fff}.btn-green:hover{opacity:.9}
    .btn-google{background:#fff;color:var(--text);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px}
    .btn-google:hover{background:var(--bg)}
    .btn-google svg{width:18px;height:18px;flex-shrink:0}
    .divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--subtle);font-size:12px}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
    .error-msg{font-size:13px;color:var(--orange);margin-top:10px;min-height:18px;text-align:center}
    .success-msg{font-size:13px;color:var(--green);margin-top:10px;min-height:18px;text-align:center}
    .loading{opacity:.6;pointer-events:none}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin-right:6px;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}
    .terms{font-size:11px;color:var(--subtle);text-align:center;margin-top:16px;line-height:1.5}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">Court<span>side</span></div>
  <div class="tagline">Fantasy basketball powered by AI projections</div>

  <div class="tabs">
    <button class="tab active" onclick="setTab(this,'login')">Sign in</button>
    <button class="tab" onclick="setTab(this,'signup')">Create account</button>
  </div>

  <!-- LOGIN -->
  <div id="panel-login">
    <label>Email</label>
    <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
    <label>Password</label>
    <input type="password" id="login-pwd" placeholder="••••••••" autocomplete="current-password"
           onkeydown="if(event.key==='Enter')login()">
    <div class="error-msg" id="login-err"></div>
    <button class="btn btn-green" id="login-btn" onclick="login()">Sign in</button>
    <div class="divider">or</div>
    <button class="btn btn-google" onclick="googleSignIn()">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
  </div>

  <!-- SIGNUP -->
  <div id="panel-signup" style="display:none">
    <label>Email</label>
    <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email">
    <label>Password</label>
    <input type="password" id="signup-pwd" placeholder="Min 6 characters" autocomplete="new-password">
    <label>Confirm password</label>
    <input type="password" id="signup-pwd2" placeholder="••••••••" autocomplete="new-password"
           onkeydown="if(event.key==='Enter')signup()">
    <div class="error-msg" id="signup-err"></div>
    <div class="success-msg" id="signup-ok"></div>
    <button class="btn btn-green" id="signup-btn" onclick="signup()">Create account</button>
    <div class="divider">or</div>
    <button class="btn btn-google" onclick="googleSignIn()">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
    <div class="terms">By creating an account you agree to our terms of service.</div>
  </div>
</div>

<script>
const API = 'https://hoopiq-api-production-d3a4.up.railway.app';

// Determine where to go after sign-in
const urlParams   = new URLSearchParams(window.location.search);
const redirectTo  = urlParams.get('redirect') === 'lobby' ? 'lobby.html' : 'dashboard.html';

// If already logged in, redirect immediately
const session = JSON.parse(localStorage.getItem('courtside_session') || 'null');
if (session?.access_token) {
  window.location.href = redirectTo;
}

function setTab(btn, tab) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-login').style.display  = tab === 'login'  ? 'block' : 'none';
  document.getElementById('panel-signup').style.display = tab === 'signup' ? 'block' : 'none';
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  btn.classList.toggle('loading', loading);
  btn.innerHTML = loading
    ? `<span class="spinner"></span> Please wait...`
    : btnId === 'login-btn' ? 'Sign in' : 'Create account';
}

async function login() {
  const email = document.getElementById('login-email').value.trim();
  const pwd   = document.getElementById('login-pwd').value;
  const errEl = document.getElementById('login-err');
  errEl.textContent = '';
  if (!email || !pwd) { errEl.textContent = 'Enter your email and password.'; return; }
  setLoading('login-btn', true);
  try {
    const res  = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, password: pwd}),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');
    saveSession(data);
    window.location.href = redirectTo;
  } catch(e) {
    errEl.textContent = e.message;
    setLoading('login-btn', false);
  }
}

async function signup() {
  const email = document.getElementById('signup-email').value.trim();
  const pwd   = document.getElementById('signup-pwd').value;
  const pwd2  = document.getElementById('signup-pwd2').value;
  const errEl = document.getElementById('signup-err');
  const okEl  = document.getElementById('signup-ok');
  errEl.textContent = ''; okEl.textContent = '';
  if (!email) { errEl.textContent = 'Enter your email.'; return; }
  if (pwd.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; return; }
  if (pwd !== pwd2)   { errEl.textContent = 'Passwords do not match.'; return; }
  setLoading('signup-btn', true);
  try {
    const res  = await fetch(`${API}/auth/signup`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, password: pwd}),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Signup failed');
    if (data.session?.access_token) {
      saveSession(data);
      window.location.href = 'dashboard.html';
    } else {
      okEl.textContent = '✓ Account created! Check your email to confirm, then sign in.';
      setLoading('signup-btn', false);
    }
  } catch(e) {
    errEl.textContent = e.message;
    setLoading('signup-btn', false);
  }
}

async function googleSignIn() {
  try {
    const callbackUrl = `https://rozymozy.github.io/hoopiq/auth-callback.html?redirect=${redirectTo === 'lobby.html' ? 'lobby' : 'dashboard'}`;
    const res  = await fetch(`${API}/auth/google-url?redirect=${encodeURIComponent(callbackUrl)}`);
    const data = await res.json();
    if (data.url) window.location.href = data.url;
  } catch(e) {
    alert('Could not start Google sign-in: ' + e.message);
  }
}

function saveSession(data) {
  localStorage.setItem('courtside_session', JSON.stringify(data.session));
  localStorage.setItem('courtside_user',    JSON.stringify(data.user));
}
</script>
</body>
</html>
