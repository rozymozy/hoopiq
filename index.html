<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HoopIQ — Player Projections</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f5f5f5; color: #1a1a1a; }
    .nav { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; background: white; border-bottom: 1px solid #e5e5e5; }
    .logo { font-size: 18px; font-weight: 600; color: #1a1a1a; }
    .logo span { color: #1D9E75; }
    .status { font-size: 12px; color: #888; }
    .status.ok { color: #1D9E75; }
    .container { max-width: 700px; margin: 20px auto; padding: 0 16px; }
    .search { width: 100%; padding: 10px 14px; font-size: 14px; border: 1px solid #e5e5e5; border-radius: 8px; margin-bottom: 16px; background: white; }
    .filters { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-btn { font-size: 12px; padding: 4px 12px; border-radius: 20px; border: 1px solid #e5e5e5; background: white; cursor: pointer; color: #666; }
    .filter-btn.on { background: #1D9E75; color: white; border-color: #1D9E75; }
    .player-card { background: white; border-radius: 10px; padding: 14px 16px; margin-bottom: 8px; border: 1px solid #e5e5e5; cursor: pointer; transition: border-color 0.15s; }
    .player-card:hover { border-color: #1D9E75; }
    .player-card.expanded { border-color: #1D9E75; }
    .card-top { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 12px; }
    .player-name { font-size: 14px; font-weight: 600; color: #1a1a1a; }
    .player-meta { font-size: 12px; color: #888; margin-top: 2px; }
    .proj-block { text-align: right; }
    .proj-val { font-size: 20px; font-weight: 600; color: #1D9E75; }
    .proj-label { font-size: 10px; color: #aaa; }
    .avg-bar { margin-top: 10px; }
    .avg-label { display: flex; justify-content: space-between; font-size: 11px; color: #aaa; margin-bottom: 4px; }
    .bar-track { height: 5px; background: #f0f0f0; border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; background: #1D9E75; }
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid #f0f0f0; }
    .stat-box { background: #f8f8f8; border-radius: 6px; padding: 7px 8px; text-align: center; }
    .stat-val { font-size: 15px; font-weight: 600; color: #1a1a1a; }
    .stat-label { font-size: 10px; color: #aaa; margin-top: 2px; }
    .detail { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid #f0f0f0; }
    .detail.open { display: block; }
    .detail-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 6px; }
    .detail-box { background: #f8f8f8; border-radius: 6px; padding: 6px 8px; text-align: center; }
    .detail-val { font-size: 13px; font-weight: 600; color: #1a1a1a; }
    .detail-label { font-size: 10px; color: #aaa; margin-top: 1px; }
    .loading { text-align: center; padding: 40px; color: #888; font-size: 14px; }
    .error { text-align: center; padding: 40px; color: #D85A30; font-size: 14px; }
    .count { font-size: 12px; color: #888; margin-bottom: 12px; }
    .trend { font-size: 11px; margin-top: 3px; }
    .trend.up { color: #1D9E75; }
    .trend.down { color: #D85A30; }
    .rank { font-size: 11px; font-weight: 600; color: #aaa; min-width: 24px; text-align: center; }
    .card-top-left { display: flex; align-items: center; gap: 10px; }
  </style>
</head>
<body>

<div class="nav">
  <div class="logo">Hoop<span>IQ</span></div>
  <div class="status" id="status">Connecting...</div>
</div>

<div class="container">
  <input class="search" type="text" placeholder="Search players..." id="search" oninput="filterPlayers()">
  <div class="filters">
    <button class="filter-btn on" onclick="filterPos(this,'ALL')">All</button>
  </div>
  <div class="count" id="count"></div>
  <div id="player-list"><div class="loading">Loading projections...</div></div>
</div>

<script>
const API = 'https://hoopiq-api-production-d3a4.up.railway.app';
let allPlayers = [];
let currentPos = 'ALL';

// Position map based on common player names — real app would have this in the API
const posMap = {};

async function init() {
  try {
    // Check health
    const h = await fetch(`${API}/health`);
    const health = await h.json();
    document.getElementById('status').textContent = `✓ Live — ${health.players} players`;
    document.getElementById('status').className = 'status ok';

    // Load top players
    const r = await fetch(`${API}/top?limit=160`);
    allPlayers = await r.json();

    renderPlayers(allPlayers);
    document.getElementById('count').textContent = `${allPlayers.length} players · sorted by projected DK points`;

  } catch(e) {
    document.getElementById('status').textContent = '✗ API offline';
    document.getElementById('player-list').innerHTML = `<div class="error">Cannot connect to API.<br>Make sure python api.py is running.</div>`;
  }
}

function renderPlayers(players) {
  const maxDk = Math.max(...players.map(p => p.dk_avg));
  document.getElementById('player-list').innerHTML = players.map((p, i) => {
    const diff = p.proj_dk - p.dk_avg;
    const trendText = diff > 2 ? `↑ +${diff.toFixed(1)} vs season avg` : diff < -2 ? `↓ ${diff.toFixed(1)} vs season avg` : '— on track';
    const trendClass = diff > 2 ? 'up' : diff < -2 ? 'down' : '';
    const barWidth = Math.round((p.dk_avg / maxDk) * 100);

    return `
    <div class="player-card" id="card-${i}" onclick="toggleDetail(${i})">
      <div class="card-top">
        <div class="card-top-left">
          <div class="rank">#${i+1}</div>
          <div>
            <div class="player-name">${p.name}</div>
            <div class="player-meta">${p.games} games · ${p.min_avg}min avg</div>
            <div class="trend ${trendClass}">${trendText}</div>
          </div>
        </div>
        <div class="proj-block">
          <div class="proj-val">${p.proj_dk}</div>
          <div class="proj-label">proj DK</div>
        </div>
      </div>
      <div class="avg-bar">
        <div class="avg-label"><span>Season avg: ${p.dk_avg}</span><span>Max: ${maxDk.toFixed(1)}</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${barWidth}%"></div></div>
      </div>
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-val">${p.pts}</div><div class="stat-label">PTS</div></div>
        <div class="stat-box"><div class="stat-val">${p.reb}</div><div class="stat-label">REB</div></div>
        <div class="stat-box"><div class="stat-val">${p.ast}</div><div class="stat-label">AST</div></div>
        <div class="stat-box"><div class="stat-val">${p.stl}</div><div class="stat-label">STL</div></div>
      </div>
      <div class="detail" id="detail-${i}">
        <div class="detail-row">
          <div class="detail-box"><div class="detail-val">${p.blk}</div><div class="detail-label">BLK</div></div>
          <div class="detail-box"><div class="detail-val">${(p.fg_pct*100).toFixed(1)}%</div><div class="detail-label">FG%</div></div>
          <div class="detail-box"><div class="detail-val">${(p.ft_pct*100).toFixed(1)}%</div><div class="detail-label">FT%</div></div>
          <div class="detail-box"><div class="detail-val">${p.fg3m}</div><div class="detail-label">3PM</div></div>
        </div>
        <div class="detail-row">
          <div class="detail-box"><div class="detail-val">${p.tov}</div><div class="detail-label">TO</div></div>
          <div class="detail-box"><div class="detail-val">${p.dk_avg}</div><div class="detail-label">DK avg</div></div>
          <div class="detail-box"><div class="detail-val">${p.dk_std}</div><div class="detail-label">DK std</div></div>
          <div class="detail-box"><div class="detail-val">${p.opp||'—'}</div><div class="detail-label">Next opp</div></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleDetail(i) {
  const card = document.getElementById(`card-${i}`);
  const detail = document.getElementById(`detail-${i}`);
  card.classList.toggle('expanded');
  detail.classList.toggle('open');
}

function filterPlayers() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = allPlayers.filter(p => p.name.toLowerCase().includes(q));
  renderPlayers(filtered);
  document.getElementById('count').textContent = `${filtered.length} players found`;
}

function filterPos(btn, pos) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  currentPos = pos;
  filterPlayers();
}

init();
</script>
</body>
</html>
